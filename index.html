<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arriba el Toluca</title>

<style>
    body {
        margin: 0;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    h1 {
        color: red;
        font-size: 8vw;
        font-family: Arial, sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        animation: parpadear 0.8s infinite;
        text-shadow: 0 0 20px red, 0 0 40px red;
    }

    @keyframes parpadear {
        0%, 50% {
            opacity: 1;
        }
        51%, 100% {
            opacity: 0;
        }
    }
</style>
</head>

<body>
    <h1>ARRIBA EL TOLUCA</h1>
</body>
</html>
